paths:
  /admin/roles:
    get:
      tags:
        - Admin
      summary: Get all roles
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
        - name: search
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Roles retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Role'
                  pagination:
                    $ref: '../openapi.yaml#/components/schemas/Pagination'
    post:
      tags:
        - Admin
      summary: Create role
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - slug
              properties:
                name:
                  type: string
                slug:
                  type: string
      responses:
        '201':
          description: Role created

  /admin/centres:
    get:
      tags:
        - Admin
      summary: Get all centres
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Centres retrieved
    post:
      tags:
        - Admin
      summary: Create centre
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - slug
              properties:
                name:
                  type: string
                slug:
                  type: string
      responses:
        '201':
          description: Centre created

  /admin/languages:
    get:
      tags:
        - Admin
      summary: Get all languages
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Languages retrieved
    post:
      tags:
        - Admin
      summary: Create language
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - slug
                - code
              properties:
                name:
                  type: string
                slug:
                  type: string
                code:
                  type: string
      responses:
        '201':
          description: Language created

  /admin/statuses:
    get:
      tags:
        - Admin
      summary: Get all statuses
      responses:
        '200':
          description: Statuses retrieved
    post:
      tags:
        - Admin
      summary: Create status
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - slug
                - type
              properties:
                name:
                  type: string
                slug:
                  type: string
                type:
                  type: string
                  enum: [userStatus, leadStatus, leadSubStatus]
                description:
                  type: string
      responses:
        '201':
          description: Status created

  /admin/users:
    get:
      tags:
        - Admin
      summary: Get all users
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Users retrieved

components:
  schemas:
    Role:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        slug:
          type: string
        createdAt:
          type: string
          format: date-time
