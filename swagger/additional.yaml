paths:
  /call-logs:
    get:
      tags:
        - Call Logs
      summary: Get call logs
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
        - name: startDate
          in: query
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          schema:
            type: string
            format: date
        - name: userId
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Call logs retrieved

  /activity-logs:
    get:
      tags:
        - Activity Logs
      summary: Get activity logs
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
        - name: startDate
          in: query
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          schema:
            type: string
            format: date
        - name: userId
          in: query
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Activity logs retrieved

  /lead-sources:
    get:
      tags:
        - Lead Sources
      summary: Get all lead sources
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
        - name: isApiSource
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: Lead sources retrieved
    post:
      tags:
        - Lead Sources
      summary: Create lead source
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - slug
              properties:
                name:
                  type: string
                slug:
                  type: string
                description:
                  type: string
                isApiSource:
                  type: boolean
      responses:
        '201':
          description: Lead source created

  /lead-sources/{id}:
    get:
      tags:
        - Lead Sources
      summary: Get lead source by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Lead source retrieved
    put:
      tags:
        - Lead Sources
      summary: Update lead source
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Lead source updated
    delete:
      tags:
        - Lead Sources
      summary: Delete lead source
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Lead source deleted

  /project-and-house-types:
    get:
      tags:
        - Project & House Types
      summary: Get all types
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
        - name: type
          in: query
          schema:
            type: string
            enum: [project, house]
      responses:
        '200':
          description: Types retrieved
    post:
      tags:
        - Project & House Types
      summary: Create type
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - type
              properties:
                name:
                  type: string
                type:
                  type: string
                  enum: [project, house]
                description:
                  type: string
      responses:
        '201':
          description: Type created

  /documents/upload:
    post:
      tags:
        - Documents
      summary: Upload document
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                leadId:
                  type: string
                folderId:
                  type: string
                keywords:
                  type: array
                  items:
                    type: string
                description:
                  type: string
      responses:
        '201':
          description: Document uploaded

  /documents:
    get:
      tags:
        - Documents
      summary: Get documents
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
        - name: leadId
          in: query
          schema:
            type: string
        - name: folderId
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Documents retrieved

  /documents/{id}:
    get:
      tags:
        - Documents
      summary: Get document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Document retrieved
    put:
      tags:
        - Documents
      summary: Update document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Document updated
    delete:
      tags:
        - Documents
      summary: Delete document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Document deleted

  /documents/{id}/view:
    get:
      tags:
        - Documents
      summary: View document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Document file

  /documents/{id}/download:
    get:
      tags:
        - Documents
      summary: Download document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Document file
