paths:
  /users:
    get:
      tags:
        - Users
      summary: Get all users
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
        - name: search
          in: query
          schema:
            type: string
        - name: role
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: centre
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Users retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
                  pagination:
                    $ref: '../openapi.yaml#/components/schemas/Pagination'
    post:
      tags:
        - Users
      summary: Create user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - email
                - mobileNumber
                - password
                - designation
                - roleId
                - statusId
                - qualification
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
                mobileNumber:
                  type: string
                password:
                  type: string
                  minLength: 6
                designation:
                  type: string
                roleId:
                  type: string
                statusId:
                  type: string
                centreId:
                  type: string
                languageIds:
                  type: array
                  items:
                    type: string
                qualification:
                  type: string
                  enum: [high_value, low_value]
                userType:
                  type: string
                  enum: [regular, cp_presales]
      responses:
        '201':
          description: User created
        '400':
          description: Validation error

  /users/{id}:
    put:
      tags:
        - Users
      summary: Update user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: User updated
    delete:
      tags:
        - Users
      summary: Delete user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User deleted

  /users/{id}/profile-image:
    post:
      tags:
        - Users
      summary: Upload profile image
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                profileImage:
                  type: string
                  format: binary
      responses:
        '200':
          description: Image uploaded

  /users/export:
    get:
      tags:
        - Users
      summary: Export users
      responses:
        '200':
          description: CSV data

components:
  schemas:
    User:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        email:
          type: string
        mobileNumber:
          type: string
        designation:
          type: string
        roleId:
          type: object
          properties:
            name:
              type: string
            slug:
              type: string
        statusId:
          type: object
        centreId:
          type: object
        languageIds:
          type: array
        qualification:
          type: string
        userType:
          type: string
        profileImage:
          type: string
        leadCount:
          type: integer
        createdAt:
          type: string
          format: date-time
